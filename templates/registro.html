{% extends "base.html" %}

{% block content %}

<div style="max-width: 500px; margin: 60px auto;">
    <div class="card">

        <div class="text-center mb-16">
            <div style="font-size: 72px;">👤</div>
            <h1>Crear cuenta</h1>
            <p style="color: #7F8C8D;">Regístrate para empezar</p>
        </div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <label>Tu nombre</label>
            <input
                type="text"
                name="nombre"
                placeholder="María García"
                required
            >

            <label>Correo electrónico</label>
            <input
                type="email"
                name="email"
                placeholder="tu@email.com"
                required
            >

            <label>Contraseña</label>
            <input
                type="password"
                name="password"
                placeholder="Mínimo 6 caracteres"
                required
            >

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">
                Crear cuenta
            </button>
        </form>

        <div class="text-center mt-24">
            <p style="color: #7F8C8D; font-size: 18px;">¿Ya tienes cuenta?</p>
            <a href="/login" class="btn btn-primary" style="margin-top: 12px; display: block;">
                Iniciar sesión
            </a>
        </div>

    </div>
</div>

{% endblock %}
