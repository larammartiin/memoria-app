{% extends "base.html" %}

{% block content %}

<div style="max-width: 500px; margin: 60px auto;">
    <div class="card">

        <div class="text-center mb-16">
            <div style="font-size: 72px;">👤</div>
            <h1>Crear cuenta</h1>
            <p style="color: #8d6e63;">Regístrate para empezar</p>
        </div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <label>Tu nombre</label>
            <input
                type="text"
                name="nombre"
                placeholder="María García"
                required
            >

            <label>Correo electrónico</label>
            <input
                type="email"
                name="email"
                placeholder="tu@email.com"
                required
            >

            <label>Contraseña</label>
            <input
                type="password"
                name="password"
                placeholder="Mínimo 6 caracteres"
                required
            >

            <label>🔒 Pregunta de seguridad</label>
        <select name="pregunta_seguridad" required>
            <option value="">Selecciona una pregunta...</option>
            <option value="¿Cómo se llamaba tu primera mascota?">¿Cómo se llamaba tu primera mascota?</option>
            <option value="¿En qué ciudad naciste?">¿En qué ciudad naciste?</option>
            <option value="¿Cuál es el nombre de tu madre?">¿Cuál es el nombre de tu madre?</option>
            <option value="¿Cuál era tu asignatura favorita?">¿Cuál era tu asignatura favorita?</option>
            <option value="¿Cómo se llamaba tu mejor amigo de infancia?">¿Cómo se llamaba tu mejor amigo de infancia?</option>
        </select>

        <label>✏️ Tu respuesta</label>
        <input
            type="text"
            name="respuesta_seguridad"
            placeholder="Escribe tu respuesta..."
            required
        >
        
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">
                Crear cuenta
            </button>
        </form>

        <div class="text-center mt-24">
            <p style="color: #8d6e63; font-size: 18px;">¿Ya tienes cuenta?</p>
            <a href="/login" class="btn btn-primary" style="margin-top: 12px; display: block;">
                Iniciar sesión
            </a>
        </div>

    </div>
</div>

{% endblock %}
