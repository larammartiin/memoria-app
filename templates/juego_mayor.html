<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemorIA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background-color: #fdfaf6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .cabecera {
            background-color: #8d6e63;
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cabecera-nombre {
            font-size: 28px;
            font-weight: bold;
            color: white;
        }

        .cabecera-marcador {
            display: flex;
            gap: 24px;
            font-size: 26px;
        }

        .rosco-container {
            display: flex;
            justify-content: center;
            padding: 32px 0 0;
            transform: scale(1.2);
            transform-origin: top center;
            margin-bottom: 40px;
        }

        .letra-grande {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background-color: #8d6e63;
            color: white;
            font-size: 60px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 24px auto 0;
            box-shadow: 0 4px 20px rgba(141,110,99,0.4);
        }

        .indicacion-wrapper { text-align: center; }

        .indicacion {
            text-align: center;
            margin: 20px auto;
            display: inline-block;
            background: #fdf6f0;
            border: 3px solid #8d6e63;
            border-radius: 999px;
            padding: 10px 32px;
            font-size: 26px;
            font-weight: bold;
            color: #8d6e63;
        }

        .pregunta {
            font-size: 32px;
            line-height: 1.5;
            color: #4a3728;
            text-align: center;
            padding: 0 32px;
            margin: 16px 0 28px;
        }

        .pista-box {
            background: #fffbe6;
            border: 3px solid #e6a817;
            border-radius: 16px;
            padding: 20px 32px;
            font-size: 26px;
            color: #4a3728;
            text-align: center;
            margin: 0 32px 24px;
            display: none;
        }

        .input-respuesta {
            width: calc(100% - 64px);
            margin: 20px 32px 0;
            padding: 20px;
            font-size: 34px;
            border: 3px solid #8d6e63;
            border-radius: 16px;
            text-align: center;
            text-transform: uppercase;
            background: white;
            color: #4a3728;
            display: block;
        }

        .input-respuesta:focus {
            outline: none;
            border-color: #5d4037;
            box-shadow: 0 0 0 4px rgba(141,110,99,0.2);
        }

        .botones {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 16px 32px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }

        .btn-grande {
            width: 100%;
            padding: 18px;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            text-align: center;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-responder { background-color: #81b88b; color: white; }
        .btn-pista { background-color: #e6a817; color: white; }
        .btn-pasar { background-color: #e07070; color: white; }

        .btn-grande:active {
            opacity: 0.8;
            transform: scale(0.98);
        }

        .progreso-barra {
            height: 16px;
            background: #f0e6dc;
            border-radius: 999px;
            margin: 0 32px;
        }

        .progreso-fill {
            height: 16px;
            background: #8d6e63;
            border-radius: 999px;
            transition: width 0.3s;
        }

        .progreso-texto {
            text-align: center;
            font-size: 20px;
            color: #8d6e63;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <div class="cabecera">
        <div class="cabecera-nombre">🧠 {{ nombre_mayor }}</div>
        <div class="cabecera-marcador">
            <span style="color: #90EE90;">✅ {{ correctas }}</span>
            <span style="color: #FFB3B3;">❌ {{ incorrectas }}</span>
            <span style="color: #FFE066;">⏭️ {{ pasadas }}</span>
        </div>
    </div>

    <div class="rosco-container">
        <div style="position: relative; width: 320px; height: 320px;">
            {% for p in posiciones %}
            <div style="
                position: absolute;
                width: 38px;
                height: 38px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: bold;
                font-size: 15px;
                left: {{ p.x | int }}px;
                top: {{ p.y | int }}px;
                transform: translate(-50%, -50%);
                background-color: {% if p.estado == 'activa' %}#4A90D9{% elif p.estado == 'correcta' %}#52C41A{% elif p.estado == 'incorrecta' %}#FF4D4F{% elif p.estado == 'pasada' %}#FAAD14{% else %}#E0E0E0{% endif %};
                color: {% if p.estado == 'pendiente' %}#2C3E50{% else %}white{% endif %};
                border: 3px solid {% if p.estado == 'activa' %}#1a6abf{% elif p.estado == 'correcta' %}#389e0d{% elif p.estado == 'incorrecta' %}#cf1322{% elif p.estado == 'pasada' %}#d48806{% else %}#CCCCCC{% endif %};
                box-shadow: {% if p.estado == 'activa' %}0 0 0 5px rgba(74,144,217,0.35){% else %}none{% endif %};
            ">
                {{ p.letra }}
            </div>
            {% endfor %}
        </div>
    </div>

    <div class="letra-grande">{{ letra }}</div>

    <div class="indicacion-wrapper">
        <span class="indicacion" id="texto-indicacion">{{ indicacion }}</span>
    </div>

    <div class="pregunta" id="texto-pregunta">{{ pregunta }}</div>

    <div class="pista-box" id="pista-box">
        💡 {{ pista }}
    </div>

    <div class="progreso-barra">
        <div class="progreso-fill" style="width: {{ (letra_index / total_letras * 100) | int }}%;"></div>
    </div>
    <div class="progreso-texto">Pregunta {{ letra_index + 1 }} de {{ total_letras }}</div>

    <form method="POST" action="/juego/responder_mayor" id="formulario">
        <input
            type="text"
            name="respuesta"
            id="respuesta"
            class="input-respuesta"
            placeholder="Escribe o habla aquí..."
            autocomplete="off"
        >
        
        <div class="botones">
            <button type="button" class="btn-grande" onclick="leerPregunta()" style="background-color: #7B68EE; color: white;">
                🔊 Repetir pregunta
            </button>
            <button type="button" id="btn-microfono" onclick="iniciarDictado()" class="btn-grande" style="background-color: #4A90D9; color: white;">
                🎤 Pulsa para hablar
            </button>
            <button type="submit" name="accion" value="responder" class="btn-grande btn-responder">
                ✅ Responder
            </button>
            <button type="button" class="btn-grande btn-pista" onclick="mostrarPista()">
                💡 Ver pista
            </button>
            <button type="submit" name="accion" value="pasar" class="btn-grande btn-pasar">
                ⏭️ Pasar
            </button>
        </div>

        </div>
    </form>

    <script>
        function mostrarPista() {
            document.getElementById('pista-box').style.display = 'block';
        }

        document.getElementById('respuesta').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('formulario').querySelector('[value="responder"]').click();
            }
        });

        // Leer la pregunta en voz alta automáticamente al cargar la página
       function leerPregunta() {
            const indicacion = document.getElementById('texto-indicacion').textContent;
            const pregunta = document.getElementById('texto-pregunta').textContent;

            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();

                // Primera parte: indicación
                const parte1 = new SpeechSynthesisUtterance(indicacion);
                parte1.lang = 'es-ES';
                parte1.rate = 0.8;
                parte1.pitch = 1.1;
                parte1.volume = 1;

                // Pausa entre indicación y pregunta
                const silencio = new SpeechSynthesisUtterance(' ');
                silencio.lang = 'es-ES';
                silencio.rate = 0.1;

                // Segunda parte: pregunta
                const parte2 = new SpeechSynthesisUtterance(pregunta);
                parte2.lang = 'es-ES';
                parte2.rate = 0.78;
                parte2.pitch = 1.05;
                parte2.volume = 1;

                // Seleccionar la mejor voz española disponible
                const voces = window.speechSynthesis.getVoices();
                const vozEspanol = voces.find(v =>
                    v.lang === 'es-ES' && v.localService === true
                ) || voces.find(v =>
                    v.lang.startsWith('es')
                );

                if (vozEspanol) {
                    parte1.voice = vozEspanol;
                    parte2.voice = vozEspanol;
                }

                window.speechSynthesis.speak(parte1);
                window.speechSynthesis.speak(silencio);
                window.speechSynthesis.speak(parte2);
            }
        }

        // Cargar voces y leer cuando estén disponibles
        function iniciarVoz() {
            if ('speechSynthesis' in window) {
                if (window.speechSynthesis.getVoices().length > 0) {
                    setTimeout(leerPregunta, 800);
                } else {
                    window.speechSynthesis.onvoiceschanged = () => {
                        setTimeout(leerPregunta, 800);
                    };
                }
            }
        }

        // Leer automáticamente al cargar
        
        window.addEventListener('load', iniciarVoz);

    // Reconocimiento de voz
        let reconocimiento = null;
        let escuchando = false;

        function iniciarDictado() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                alert('Tu navegador no soporta reconocimiento de voz. Usa Chrome o Safari.');
                return;
            }

            if (escuchando) {
                reconocimiento.stop();
                return;
            }

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            reconocimiento = new SpeechRecognition();
            reconocimiento.lang = 'es-ES';
            reconocimiento.continuous = false;
            reconocimiento.interimResults = false;

            const btn = document.getElementById('btn-microfono');

            reconocimiento.onstart = () => {
                escuchando = true;
                btn.style.backgroundColor = '#FF4D4F';
                btn.textContent = '🔴 Escuchando... pulsa para parar';
                window.speechSynthesis.cancel();
            };

            reconocimiento.onresult = (event) => {
                const texto = event.results[0][0].transcript.toUpperCase();
                document.getElementById('respuesta').value = texto;
                btn.style.backgroundColor = '#52C41A';
                btn.textContent = '✅ Dicho: ' + texto;
            };

            reconocimiento.onerror = (event) => {
                btn.style.backgroundColor = '#4A90D9';
                btn.textContent = '🎤 Pulsa para hablar';
                escuchando = false;
                if (event.error === 'not-allowed') {
                    alert('Permite el acceso al micrófono para usar esta función.');
                }
            };

            reconocimiento.onend = () => {
                escuchando = false;
                setTimeout(() => {
                    if (btn.style.backgroundColor !== 'rgb(82, 196, 26)') {
                        btn.style.backgroundColor = '#4A90D9';
                        btn.textContent = '🎤 Pulsa para hablar';
                    }
                }, 2000);
            };

            reconocimiento.start();
        }
    </script>

</body>
</html>
