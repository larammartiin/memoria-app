<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemorIA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background-color: #F0F4FF;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .cabecera {
            background-color: #4A90D9;
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cabecera-nombre {
            font-size: 28px;
            font-weight: bold;
            color: white;
        }

        .cabecera-marcador {
            display: flex;
            gap: 24px;
            font-size: 26px;
        }

        .rosco-container {
            display: flex;
            justify-content: center;
            padding: 32px 0 0;
            transform: scale(1.2);
            transform-origin: top center;
            margin-bottom: 40px;
        }

        .letra-grande {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background-color: #4A90D9;
            color: white;
            font-size: 60px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 24px auto 0;
            box-shadow: 0 4px 20px rgba(74,144,217,0.4);
        }

        .indicacion-wrapper { text-align: center; }

        .indicacion {
            text-align: center;
            margin: 20px auto;
            display: inline-block;
            background: #E8F0FF;
            border: 3px solid #4A90D9;
            border-radius: 999px;
            padding: 10px 32px;
            font-size: 26px;
            font-weight: bold;
            color: #4A90D9;
        }

        .pregunta {
            font-size: 32px;
            line-height: 1.5;
            color: #2C3E50;
            text-align: center;
            padding: 0 32px;
            margin: 16px 0 28px;
        }

        .pista-box {
            background: #FFF7E6;
            border: 3px solid #FAAD14;
            border-radius: 16px;
            padding: 20px 32px;
            font-size: 26px;
            color: #2C3E50;
            text-align: center;
            margin: 0 32px 24px;
            display: none;
        }

        .input-respuesta {
            width: calc(100% - 64px);
            margin: 20px 32px 0;
            padding: 20px;
            font-size: 34px;
            border: 3px solid #4A90D9;
            border-radius: 16px;
            text-align: center;
            text-transform: uppercase;
            background: white;
            color: #2C3E50;
            display: block;
        }

        .input-respuesta:focus {
            outline: none;
            border-color: #1a6abf;
            box-shadow: 0 0 0 4px rgba(74,144,217,0.2);
        }

        .botones {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 16px 800px;
        }

        .btn-grande {
            width: 100%;
            padding: 16px;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            text-align: center;
        }

        .btn-responder { background-color: #52C41A; color: white; }
        .btn-pista { background-color: #FAAD14; color: white; }
        .btn-pasar { background-color: #FF4D4F; color: white; }

        .btn-grande:active {
            opacity: 0.8;
            transform: scale(0.98);
        }

        .progreso-barra {
            height: 16px;
            background: #D0D8F0;
            border-radius: 999px;
            margin: 0 32px;
        }

        .progreso-fill {
            height: 16px;
            background: #4A90D9;
            border-radius: 999px;
            transition: width 0.3s;
        }

        .progreso-texto {
            text-align: center;
            font-size: 20px;
            color: #7F8C8D;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <div class="cabecera">
        <div class="cabecera-nombre">🧠 {{ nombre_mayor }}</div>
        <div class="cabecera-marcador">
            <span style="color: #90EE90;">✅ {{ correctas }}</span>
            <span style="color: #FFB3B3;">❌ {{ incorrectas }}</span>
            <span style="color: #FFE066;">⏭️ {{ pasadas }}</span>
        </div>
    </div>

    <div class="rosco-container">
        <div style="position: relative; width: 320px; height: 320px;">
            {% for p in posiciones %}
            <div style="
                position: absolute;
                width: 38px;
                height: 38px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: bold;
                font-size: 15px;
                left: {{ p.x | int }}px;
                top: {{ p.y | int }}px;
                transform: translate(-50%, -50%);
                background-color: {% if p.estado == 'activa' %}#4A90D9{% elif p.estado == 'correcta' %}#52C41A{% elif p.estado == 'incorrecta' %}#FF4D4F{% elif p.estado == 'pasada' %}#FAAD14{% else %}#E0E0E0{% endif %};
                color: {% if p.estado == 'pendiente' %}#2C3E50{% else %}white{% endif %};
                border: 3px solid {% if p.estado == 'activa' %}#1a6abf{% elif p.estado == 'correcta' %}#389e0d{% elif p.estado == 'incorrecta' %}#cf1322{% elif p.estado == 'pasada' %}#d48806{% else %}#CCCCCC{% endif %};
                box-shadow: {% if p.estado == 'activa' %}0 0 0 5px rgba(74,144,217,0.35){% else %}none{% endif %};
            ">
                {{ p.letra }}
            </div>
            {% endfor %}
        </div>
    </div>

    <div class="letra-grande">{{ letra }}</div>

    <div class="indicacion-wrapper">
        <span class="indicacion">{{ indicacion }}</span>
    </div>

    <div class="pregunta">{{ pregunta }}</div>

    <div class="pista-box" id="pista-box">
        💡 {{ pista }}
    </div>

    <div class="progreso-barra">
        <div class="progreso-fill" style="width: {{ (letra_index / total_letras * 100) | int }}%;"></div>
    </div>
    <div class="progreso-texto">Pregunta {{ letra_index + 1 }} de {{ total_letras }}</div>

    <form method="POST" action="/juego/responder_mayor" id="formulario">
        <input
            type="text"
            name="respuesta"
            id="respuesta"
            class="input-respuesta"
            placeholder="Escribe aquí..."
            autocomplete="off"
            autofocus
        >
        <div class="botones">
            <button type="submit" name="accion" value="responder" class="btn-grande btn-responder">
                ✅ Responder
            </button>
            <button type="button" class="btn-grande btn-pista" onclick="mostrarPista()">
                💡 Ver pista
            </button>
            <button type="submit" name="accion" value="pasar" class="btn-grande btn-pasar">
                ⏭️ Pasar
            </button>
        </div>
    </form>

    <script>
        function mostrarPista() {
            document.getElementById('pista-box').style.display = 'block';
        }
        document.getElementById('respuesta').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('formulario').querySelector('[value="responder"]').click();
            }
        });
    </script>

</body>
</html>
