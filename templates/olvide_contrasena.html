{% extends "base.html" %}
{% block content %}

<div style="max-width: 480px; margin: 60px auto;">
    <div class="card text-center">
        <div style="font-size: 64px; margin-bottom: 16px;">🔑</div>
        <h1>¿Olvidaste tu contraseña?</h1>
        <p style="color: #8d6e63; margin-top: 8px;">
            Introduce tu email y te haremos una pregunta de seguridad.
        </p>
    </div>

    {% if error %}
    <div class="card" style="background: #fff0f0; border: 2px solid #e07070;">
        <p style="color: #e07070; text-align: center;">{{ error }}</p>
    </div>
    {% endif %}

    <div class="card">
        <form method="POST">
            <label>📧 Tu email</label>
            <input type="email" name="email" placeholder="tucorreo@email.com" required>
            <button type="submit" class="btn btn-primary mt-16" style="width: 100%;">
                Continuar →
            </button>
        </form>
        <div class="text-center" style="margin-top: 16px;">
            <a href="/login" style="color: #8d6e63;">← Volver al login</a>
        </div>
    </div>
</div>

{% endblock %}
